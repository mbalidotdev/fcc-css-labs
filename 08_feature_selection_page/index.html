<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Featured Selection Page</title>
  </head>
  <body>
    <!-- MAIN SECTION -->
    <main>
      <div class="main-container">
        <h1>Feature Selection</h1>

        <!-- CARD CONTAINER -->
        <div class="feature-card-container">
          <label class="feature-card" for="checkbox1">
            <input type="checkbox" class="checkbox" id="checkbox1" />
            <span>Cloud Storage</span>
            <p>100 Gigabyte Storage</p>
          </label>
        </div>

        <div class="feature-card-container">
          <label class="feature-card" for="checkbox2">
            <input type="checkbox" class="checkbox" id="checkbox2" />
            <span>Dedicated Support</span>
            <p>24/7 Customer Help</p>
          </label>
        </div>

        <div class="feature-card-container">
          <label class="feature-card" for="checkbox3">
            <input type="checkbox" class="checkbox" id="checkbox3" />
            <span>Advanced Analytics</span>
            <p>Insights and Reports</p>
          </label>
        </div>

        <div class="feature-card-container">
          <label class="feature-card" for="checkbox4">
            <input type="checkbox" class="checkbox" id="checkbox4" />
            <span>Custom User Themes</span>
            <p>Personalized Dashboard Design</p>
          </label>
        </div>

        <div class="feature-card-container">
          <label class="feature-card" for="checkbox5">
            <input type="checkbox" class="checkbox" id="checkbox5" />
            <span>Multi-User Collab</span>
            <p>Team Access and Sharing</p>
          </label>
        </div>

        <div class="feature-card-container">
          <label class="feature-card" for="checkbox6">
            <input type="checkbox" class="checkbox" id="checkbox6" />
            <span>API Access</span>
            <p>Integrate with Your Custom Built Tools</p>
          </label>
        </div>
      </div>
    </main>
  </body>
</html>
