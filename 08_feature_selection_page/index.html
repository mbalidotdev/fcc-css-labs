<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Featured Selection Page</title>
  </head>
  <body>
    <!-- MAIN SECTION -->
    <main>
      <div class="main-container">
        <h1>Feature Selection</h1>

        <!-- CARD CONTAINER -->
        <div class="feature-card-container">
          <label class="feature-card"
            ><input type="checkbox" class="checkbox" /><span
              >Cloud Storage</span
            >
            <p>100 Gigabyte Storage</p></label
          >
        </div>

        <div class="feature-card-container">
          <label class="feature-card"
            ><input type="checkbox" class="checkbox" /><span
              >Dedicated Support</span
            >
            <p>24/7 Customer Help</p></label
          >
        </div>

        <div class="feature-card-container">
          <label class="feature-card"
            ><input type="checkbox" class="checkbox" /><span
              >Advanced Analytics</span
            >
            <p>Insights and Reports</p></label
          >
        </div>

        <div class="feature-card-container">
          <label class="feature-card"
            ><input type="checkbox" class="checkbox" /><span
              >Custom User Theams</span
            >
            <p>Personalized Dashboard Design</p></label
          >
        </div>

        <div class="feature-card-container">
          <label class="feature-card"
            ><input type="checkbox" class="checkbox" /><span
              >Multi-User Collab</span
            >
            <p>Team Access and Sharing</p></label
          >
        </div>

        <div class="feature-card-container">
          <label class="feature-card"
            ><input type="checkbox" class="checkbox" /><span>API Access</span>
            <p>Integrate with Your Custome Built Tools</p></label
          >
        </div>
      </div>
    </main>
  </body>
</html>
